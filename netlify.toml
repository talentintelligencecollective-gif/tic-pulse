[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Environment variable context
[context.production.environment]
  NODE_VERSION = "20"

[context.deploy-preview.environment]
  NODE_VERSION = "20"

# ─── Scheduled Functions ───

# News pipeline: drip-feed every 5 minutes
[functions."fetch-gdelt"]
  schedule = "*/5 * * * *"

# Podcasts (RSS): daily at 06:00 UTC — must match file netlify/functions/fetch-podcast.js
[functions."fetch-podcast"]
  schedule = "0 6 * * *"

# YouTube: daily at 06:30 UTC
[functions."fetch-youtube"]
  schedule = "30 6 * * *"

# ─── Redirects ───

# Serve .well-known files directly (for Play Store TWA)
[[redirects]]
  from = "/.well-known/*"
  to = "/.well-known/:splat"
  status = 200

# SPA fallback — serve index.html for all other routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ─── Headers ───

# Security headers for all routes
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Manifest — no cache for PWA updates
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "no-cache"
    Content-Type = "application/manifest+json"

# Service worker — always revalidate
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Asset links for Play Store TWA
[[headers]]
  for = "/.well-known/assetlinks.json"
  [headers.values]
    Content-Type = "application/json"
    Cache-Control = "public, max-age=3600"
