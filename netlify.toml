[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Environment variable context
[context.production.environment]
  NODE_VERSION = "20"

[context.deploy-preview.environment]
  NODE_VERSION = "20"

# Scheduled function: drip-feed every 5 minutes (v3)
[functions."fetch-gdelt"]
  schedule = "*/5 * * * *"

# ─── Redirects ───
# IMPORTANT: Order matters — first match wins

# Serve .well-known files directly (Digital Asset Links for Play Store)
[[redirects]]
  from = "/.well-known/*"
  to = "/.well-known/:splat"
  status = 200

# SPA fallback — serve index.html for all other routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ─── Headers ───
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Serve assetlinks.json with correct content type
[[headers]]
  for = "/.well-known/assetlinks.json"
  [headers.values]
    Content-Type = "application/json"
    Cache-Control = "public, max-age=3600"
